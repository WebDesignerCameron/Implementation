<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SFML Blue Window (Web Version)</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #2c3e50;
            font-family: sans-serif;
        }
        #window-container {
            position: relative;
            width: 800px;
            height: 600px;
            background-color: blue;
            border: 2px solid #000;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        #title-bar {
            height: 30px;
            background-color: #333;
            color: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 10px;
            cursor: default;
        }
        #close-btn {
            background-color: #ff5f56;
            border: none;
            color: white;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 12px;
            font-weight: bold;
        }
        #close-btn:hover {
            background-color: #ff3b30;
        }
        #content {
            width: 100%;
            height: calc(100% - 30px);
            background-color: blue;
        }
        #hidden-msg {
            display: none;
            color: white;
            text-align: center;
            margin-top: 50px;
        }
    </style>
</head>
<body>
    <div id="window-container">
        <div id="title-bar">
            <span>SFML Blue Window</span>
            <button id="close-btn" onclick="closeWindow()">×</button>
        </div>
        <div id="content"></div>
    </div>
    <div id="hidden-msg">
        <h1>Window Closed</h1>
        <p>Refresh the page to reopen the window.</p>
    </div>

    <script>
        function closeWindow() {
            document.getElementById('window-container').style.display = 'none';
            document.getElementById('hidden-msg').style.display = 'block';
        }
    </script>
</body>
</html>
